<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameIntel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
line-height:1.6;
}

header{
background:#161b22;
padding:20px;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid #30363d;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:28px;
font-weight:bold;
color:#58a6ff;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:3rem;
margin-bottom:15px;
}

.hero p{
max-width:700px;
margin:auto;
color:#b3b3b3;
}

.search{
text-align:center;
margin:30px;
}

.search input{
width:90%;
max-width:600px;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

.section h2{
margin-bottom:20px;
color:#58a6ff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.discord{
text-align:center;
padding:50px 20px;
background:#161b22;
}

.discord a{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:8px;
}

footer{
text-align:center;
padding:30px;
background:#161b22;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">🎮 GameIntel</div>

<ul>
<li><a href="#news">News</a></li>
<li><a href="#reviews">Reviews</a></li>
<li><a href="#guides">Guides</a></li>
<li><a href="#database">Games</a></li>
<li><a href="#discord">Discord</a></li>
</ul>

</nav>
</header>

<section class="hero">
<h1>Gaming News, Reviews & Guides</h1>
<p>
Your trusted source for gaming information, reviews,
guides, game databases, and community discussions.
</p>
</section>

<div class="search">
<input type="text" placeholder="Search games, reviews, guides...">
</div>
